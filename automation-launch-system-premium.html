<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Automation Launch System — Done-For-You GHL Setup</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --black: #080808;
      --white: #f5f4f0;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --gold-dim: #7a6128;
      --surface: #111010;
      --surface2: #191818;
      --border: rgba(201,168,76,0.18);
      --text-muted: #7a7670;
    }
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html {
      scroll-behavior: smooth;
    }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
    }
    /* GRAIN OVERLAY */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 1000;
      opacity: 0.35;
    }
    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(8,8,8,0.95), transparent);
    }
    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
    }
    .nav-cta {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--black);
      background: var(--gold);
      padding: 10px 22px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .nav-cta:hover {
      background: var(--gold-light);
    }
    /* HERO */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 120px 40px 80px;
      position: relative;
      overflow: hidden;
    }
    .hero::after {
      content: '';
      position: absolute;
      top: -200px;
      right: -200px;
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .hero-eyebrow {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 28px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.1s;
    }
    .hero h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(42px, 7vw, 96px);
      font-weight: 800;
      line-height: 1.0;
      max-width: 900px;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.25s;
    }
    .hero h1 em {
      font-style: normal;
      color: var(--gold);
    }
    .hero-sub {
      max-width: 560px;
      margin-top: 32px;
      font-size: 18px;
      color: var(--text-muted);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.4s;
    }
    .hero-actions {
      margin-top: 48px;
      display: flex;
      gap: 16px;
      align-items: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.55s;
    }
    .btn-primary {
      display: inline-block;
      background: var(--gold);
      color: var(--black);
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 18px 40px;
      text-decoration: none;
      transition: background 0.2s, transform 0.2s;
    }
    .btn-primary:hover {
      background: var(--gold-light);
      transform: translateY(-2px);
    }
    .hero-note {
      font-size: 13px;
      color: var(--text-muted);
    }
    .hero-scroll {
      position: absolute;
      bottom: 40px;
      left: 40px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold-dim);
      opacity: 0;
      animation: fadeUp 0.8s ease forwards 0.8s;
    }
    /* DIVIDER */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 40px;
    }
    /* SECTION BASE */
    section {
      padding: 100px 40px;
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 16px;
    }
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: clamp(30px, 4vw, 52px);
      font-weight: 800;
      line-height: 1.1;
      max-width: 700px;
    }
    .section-title em {
      font-style: normal;
      color: var(--gold);
    }
    /* PROBLEM */
    .problem {
      background: var(--surface);
    }
    .problem-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 1px;
      margin-top: 60px;
      border: 1px solid var(--border);
    }
    .problem-item {
      padding: 40px;
      border-right: 1px solid var(--border);
      background: var(--surface2);
    }
    .problem-item:last-child {
      border-right: none;
    }
    .problem-icon {
      font-size: 28px;
      margin-bottom: 16px;
    }
    .problem-item h3 {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .problem-item p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    /* WHAT YOU GET */
    .deliverables-list {
      margin-top: 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
    }
    .deliverable {
      background: var(--surface);
      padding: 36px 40px;
      border-left: 3px solid transparent;
      transition: border-color 0.3s;
      position: relative;
    }
    .deliverable:hover {
      border-left-color: var(--gold);
    }
    .deliverable-num {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.2em;
      color: var(--gold-dim);
      margin-bottom: 12px;
    }
    .deliverable h3 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 10px;
    }
    .deliverable p {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.6;
    }
    /* PROCESS */
    .process {
      background: var(--surface);
    }
    .process-steps {
      margin-top: 60px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .process-step {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 0;
      background: var(--surface2);
    }
    .step-num {
      font-family: 'Syne', sans-serif;
      font-size: 48px;
      font-weight: 800;
      color: var(--border);
      padding: 32px 24px;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .step-content {
      padding: 32px 40px;
    }
    .step-content h3 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    .step-content p {
      font-size: 14px;
      color: var(--text-muted);
    }
    /* PRICING */
    .pricing-wrapper {
      margin-top: 60px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2px;
      max-width: 860px;
    }
    .pricing-card {
      background: var(--surface);
      padding: 48px 40px;
      border: 1px solid var(--border);
      position: relative;
    }
    .pricing-card.featured {
      background: var(--surface2);
      border-color: var(--gold);
    }
    .pricing-badge {
      position: absolute;
      top: -1px;
      right: -1px;
      background: var(--gold);
      color: var(--black);
      font-family: 'Syne', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 14px;
    }
    .pricing-label {
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 16px;
    }
    .pricing-amount {
      font-family: 'Syne', sans-serif;
      font-size: 52px;
      font-weight: 800;
      color: var(--gold);
      line-height: 1;
    }
    .pricing-period {
      font-size: 14px;
      color: var(--text-muted);
      margin-top: 6px;
      margin-bottom: 32px;
    }
    .pricing-features {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 40px;
    }
    .pricing-features li {
      font-size: 14px;
      color: var(--white);
      padding-left: 20px;
      position: relative;
    }
    .pricing-features li::before {
      content: '→';
      position: absolute;
      left: 0;
      color: var(--gold);
      font-size: 12px;
    }
    /* GUARANTEE */
    .guarantee {
      background: var(--surface);
    }
    .guarantee-box {
      border: 1px solid var(--border);
      padding: 60px;
      max-width: 760px;
      margin-top: 60px;
      position: relative;
    }
    .guarantee-box::before {
      content: '"';
      font-family: 'Syne', sans-serif;
      font-size: 200px;
      font-weight: 800;
      color: rgba(201,168,76,0.04);
      position: absolute;
      top: -40px;
      left: 20px;
      line-height: 1;
      pointer-events: none;
    }
    .guarantee-box p {
      font-size: 20px;
      line-height: 1.7;
      color: var(--white);
      margin-bottom: 24px;
    }
    .guarantee-sig {
      font-size: 13px;
      color: var(--gold);
      letter-spacing: 0.1em;
    }
    /* FAQ */
    .faq-list {
      margin-top: 60px;
      max-width: 760px;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .faq-item {
      background: var(--surface);
      border-left: 3px solid transparent;
      transition: border-color 0.3s;
    }
    .faq-item:hover {
      border-left-color: var(--gold);
    }
    .faq-q {
      padding: 24px 32px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      user-select: none;
    }
    .faq-q::after {
      content: '+';
      color: var(--gold);
      font-size: 22px;
      font-weight: 300;
      transition: transform 0.3s;
    }
    .faq-item.open .faq-q::after {
      transform: rotate(45deg);
    }
    .faq-a {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease, padding 0.3s;
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      padding: 0 32px;
    }
    .faq-item.open .faq-a {
      max-height: 300px;
      padding: 0 32px 28px;
    }
    /* FINAL CTA */
    .final-cta {
      text-align: center;
      padding: 120px 40px;
      position: relative;
      overflow: hidden;
    }
    .final-cta::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(201,168,76,0.06) 0%, transparent 65%);
      pointer-events: none;
    }
    .final-cta h2 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(36px, 5vw, 72px);
      font-weight: 800;
      line-height: 1.05;
      max-width: 800px;
      margin: 0 auto 32px;
    }
    .final-cta h2 em {
      font-style: normal;
      color: var(--gold);
    }
    .final-cta p {
      font-size: 17px;
      color: var(--text-muted);
      max-width: 500px;
      margin: 0 auto 48px;
    }
    /* FOOTER */
    footer {
      padding: 40px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 16px;
    }
    footer p {
      font-size: 12px;
      color: var(--text-muted);
    }
    footer a {
      font-size: 12px;
      color: var(--gold-dim);
      text-decoration: none;
    }
    /* ANIMATIONS */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav { padding: 16px 20px; }
      .hero { padding: 100px 20px 60px; }
      section { padding: 70px 20px; }
      .divider { margin: 0 20px; }
      .deliverables-list { grid-template-columns: 1fr; }
      .pricing-wrapper { grid-template-columns: 1fr; }
      .process-step { grid-template-columns: 60px 1fr; }
      .step-num { font-size: 32px; padding: 24px 16px; }
      .guarantee-box { padding
