<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Automation Mastery - Automate 80% of Your Business</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
    <style>
        :root {
            --black: #0a0a0a;
            --white: #f5f2ed;
            --cream: #ede8e0;
            --gold: #c9a84c;
            --gold-light: #e8c96d;
            --gold-dim: #8a6f2e;
            --rust: #c45c2e;
            --green: #2a7a4b;
            --green-light: #3aad68;
            --gray: #6b6560;
            --gray-light: #b5b0a8;
            --border: rgba(201,168,76,0.2);
            --border-strong: rgba(201,168,76,0.5);
        }

        *, *::before, *::after { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        html { 
            scroll-behavior: smooth; 
        }

        body {
            background: var(--black);
            color: var(--white);
            font-family: 'DM Sans', sans-serif;
            font-weight: 300;
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* -- NOISE TEXTURE -- */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 1000;
            opacity: 0.35;
        }

        /* -- HERO -- */
        .hero {
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 6rem 2rem 4rem;
            position: relative;
            text-align: center;
            overflow: hidden;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: -200px; 
            left: 50%;
            transform: translateX(-50%);
            width: 900px; 
            height: 900px;
            background: radial-gradient(ellipse, rgba(201,168,76,0.12) 0%, transparent 70%);
            pointer-events: none;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: 0; 
            left: 0; 
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .eyebrow {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            border: 1px solid var(--border-strong);
            padding: 0.4rem 1rem;
            margin-bottom: 2rem;
            animation: fadeUp 0.8s ease both;
        }

        .eyebrow::before {
            content: '';
            width: 6px; 
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            animation: pulse 2s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.7); }
        }

        h1 {
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: clamp(2.8rem, 7vw, 6rem);
            line-height: 1.0;
            letter-spacing: -0.03em;
            margin-bottom: 1.5rem;
            animation: fadeUp 0.8s 0.1s ease both;
        }

        h1 em {
            font-style: normal;
            color: var(--gold);
            position: relative;
        }

        .hero-sub {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--gray-light);
            max-width: 560px;
            margin: 0 auto 2.5rem;
            animation: fadeUp 0.8s 0.2s ease both;
        }

        .proof-bar {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--green-light);
            background: rgba(42,122,75,0.12);
            border: 1px solid rgba(42,122,75,0.3);
            padding: 0.5rem 1.2rem;
            margin-bottom: 3rem;
            animation: fadeUp 0.8s 0.3s ease both;
        }

        .hero-cta {
            animation: fadeUp 0.8s 0.4s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* -- SHARED -- */
        .section {
            padding: 6rem 2rem;
            max-width: 1100px;
            margin: 0 auto;
        }

        .section-label {
            font-size: 0.68rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1rem;
        }

        h2 {
            font-family: 'Syne', sans-serif;
            font-weight: 700;
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 1.5rem;
        }

        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border-strong), transparent);
            margin: 0;
        }

        /* -- PAIN POINTS -- */
        .pain-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
            gap: 1.5px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-top: 3rem;
        }

        .pain-card {
            background: var(--black);
            padding: 2rem 1.5rem;
            transition: background 0.3s;
        }

        .pain-card:hover { 
            background: #111; 
        }

        .pain-icon {
            font-size: 1.8rem;
            margin-bottom: 1rem;
            display: block;
        }

        .pain-card h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
        }

        .pain-card p {
            font-size: 0.85rem;
            color: var(--gray-light);
            line-height: 1.5;
        }

        /* -- PRICING -- */
        .pricing-section {
            padding: 6rem 2rem;
            background: #080808;
            position: relative;
        }

        .pricing-section::before {
            content: '';
            position: absolute;
            top: 0; 
            left: 0; 
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .pricing-inner {
            max-width: 1100px;
            margin: 0 auto;
            text-align: center;
        }

        .pricing-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-top: 3rem;
            text-align: left;
        }

        .pricing-card {
            background: #0d0d0d;
            padding: 2.5rem 2rem;
            position: relative;
            display: flex;
            flex-direction: column;
            transition: background 0.3s;
        }

        .pricing-card:hover { 
            background: #111; 
        }

        .pricing-card.featured {
            background: #0f0e0b;
            border: 1px solid var(--gold);
        }

        .featured-badge {
            position: absolute;
            top: -1px; 
            left: 50%;
            transform: translateX(-50%);
            background: var(--gold);
            color: var(--black);
            font-size: 0.65rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            padding: 0.3rem 1rem;
        }

        .tier-label {
            font-size: 0.65rem;
            font-weight: 500;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--gold-dim);
            margin-bottom: 0.75rem;
        }

        .tier-name {
            font-family: 'Syne', sans-serif;
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.5rem;
        }

        .tier-desc {
            font-size: 0.85rem;
            color: var(--gray-light);
            margin-bottom: 2rem;
            line-height: 1.5;
        }

        .price-row {
            display: flex;
            align-items: baseline;
            gap: 0.3rem;
            margin-bottom: 0.4rem;
        }

        .price-amount {
            font-family: 'Syne', sans-serif;
            font-size: 3.2rem;
            font-weight: 800;
            line-height: 1;
            color: var(--white);
        }

        .price-amount.gold { 
            color: var(--gold); 
        }

        .price-currency {
            font-size: 1.2rem;
            color: var(--gray);
            align-self: flex-start;
            padding-top: 0.4rem;
        }

        .price-cadence {
            font-size: 0.8rem;
            color: var(--gray);
            margin-bottom: 2rem;
        }

        .feature-list {
            list-style: none;
            flex: 1;
            margin-bottom: 2rem;
        }

        .feature-list li {
            font-size: 0.85rem;
            color: var(--gray-light);
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            display: flex;
            align-items: flex-start;
            gap: 0.6rem;
            line-height: 1.4;
        }

        .feature-list li:last-child { 
            border-bottom: none; 
        }

        .feature-list li::before {
            content: '✓';
            color: var(--gold);
            font-size: 0.75rem;
            font-weight: 700;
            flex-shrink: 0;
            margin-top: 0.1rem;
        }

        .feature-list li.highlight::before { 
            color: var(--green-light); 
        }
        
        .feature-list li.highlight { 
            color: var(--white); 
        }

        /* -- BUTTONS -- */
        .btn {
            display: block;
            width: 100%;
            padding: 1rem 1.5rem;
            text-align: center;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
        }

        .btn-primary {
            background: var(--gold);
            color: var(--black);
        }

        .btn-primary:hover {
            background: var(--gold-light);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: transparent;
            color: var(--white);
            border: 1px solid var(--border-strong);
        }

        .btn-secondary:hover {
            border-color: var(--gold);
            color: var(--gold);
            transform: translateY(-1px);
        }

        .btn-outline-gold {
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
        }

        .btn-outline-gold:hover {
            background: var(--gold);
            color: var(--black);
            transform: translateY(-1px);
        }

        .btn-hero {
            display: inline-block;
            width: auto;
            padding: 1.1rem 2.5rem;
            background: var(--gold);
            color: var(--black);
            font-family: 'DM Sans', sans-serif;
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            text-decoration: none;
            transition: all 0.2s;
        }

        .btn-hero:hover {
            background: var(--gold-light);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(201,168,76,0.25);
        }

        /* -- CURRICULUM -- */
        .curriculum-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5px;
            background: var(--border);
            border: 1px solid var(--border);
            margin-top: 3rem;
        }

        .module-card {
            background: var(--black);
            padding: 2rem;
            display: flex;
            gap: 1.5rem;
            align-items: flex-start;
            transition: background 0.3s;
        }

        .module-card:hover { 
            background: #0f0f0f; 
        }

        .module-num {
            font-family: 'Syne', sans-serif;
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--border-strong);
            line-height: 1;
            flex-shrink: 0;
            width: 2rem;
        }

        .module-content h3 {
            font-family: 'Syne', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .module-content p {
            font-size: 0.82rem;
            color: var(--gray-light);
            line-height: 1.5;
        }

        /* -- TESTIMONIAL -- */
        .testimonial-section {
            padding: 5rem 2rem;
            background: #080808;
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .testimonial-inner {
            max-width: 700px;
            margin: 0 auto;
            text-align: center;
        }

        .quote-mark {
            font-family: 'Syne', sans-serif;
            font-size: 5rem;
            line-height: 0.5;
            color: var(--gold-dim);
            margin-bottom: 1.5rem;
            display: block;
        }

        blockquote {
            font-size: clamp(1.1rem, 2.5vw, 1.4rem);
            font-weight: 300;
            line-height: 1.6;
            color: var(--white);
            margin-bottom: 1.5rem;
        }

        cite {
            font-size: 0.8rem;
            color: var(--gold);
            font-style: normal;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        /* -- FAQ -- */
        .faq
